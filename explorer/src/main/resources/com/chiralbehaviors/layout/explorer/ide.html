<!DOCTYPE html>
<html>
<head>
<style>
html, body {
	height: 100%;
	margin: 0;
	width: 100%;
	overflow: auto;
}

#graphiql {
	height: 100vh;
}
</style>
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/graphiql/0.7.1/graphiql.min.css" />
<script src="https://cdn.jsdelivr.net/npm/whatwg-fetch@3.6.20/dist/fetch.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react@15.7.0/dist/react.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@15.7.0/dist/react-dom.min.js"></script>
<script
	src="https://cdnjs.cloudflare.com/ajax/libs/graphiql/0.7.1/graphiql.min.js"></script>
</head>
<body>
	<div id="graphiql">Loading...</div>
	<script>
		function setApp(newApp) {
			app = newApp;
			// Render <GraphiQL /> into the body.
			ReactDOM.render(React.createElement(GraphiQL, {
				fetcher : graphQLFetcher,
				query : app.getQuery(),
				variables : app.getVariables(),
				operationName : app.getOperationName(),
				onEditQuery : setQuery,
				onEditVariables : setVariables,
				onEditOperationName : setOperationName
			}), document.getElementById('graphiql'));
		}

		function setQuery(newQuery) {
			app.setQuery(newQuery);
		}
		function setVariables(newVariables) {
			app.setVariables(newVariables);
		}
		function setOperationName(newOperationName) {
			app.setOperationName(newOperationName);
		}

		var pendingResolve = null;

		function graphQLFetcher(graphQLParams) {
			return new Promise(function(resolve) {
				pendingResolve = resolve;
				app.fetchAsync(JSON.stringify(graphQLParams));
			});
		}

		function onFetchComplete(result) {
			if (pendingResolve) {
				var resolve = pendingResolve;
				pendingResolve = null;
				try {
					resolve(JSON.parse(result));
				} catch (e) {
					resolve({});
				}
			}
		}
	</script>
</body>
</html>
